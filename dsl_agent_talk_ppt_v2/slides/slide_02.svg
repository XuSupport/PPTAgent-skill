<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#081421"/>
        <stop offset="100%" stop-color="#13314A"/>
      </linearGradient>
      <linearGradient id="warmGrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#FFD58C"/>
        <stop offset="55%" stop-color="#FFB547"/>
        <stop offset="100%" stop-color="#FF8A3D"/>
      </linearGradient>
      <linearGradient id="coolGrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#3AA8FF"/>
        <stop offset="100%" stop-color="#63D4FF"/>
      </linearGradient>
      <linearGradient id="jadeGrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#2EC89B"/>
        <stop offset="100%" stop-color="#43E2B6"/>
      </linearGradient>
      <linearGradient id="violetGrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#9C87FF"/>
        <stop offset="100%" stop-color="#C3AEFF"/>
      </linearGradient>
      <radialGradient id="glowA" cx="0.5" cy="0.5" r="0.5">
        <stop offset="0%" stop-color="#63D4FF" stop-opacity="0.18"/>
        <stop offset="100%" stop-color="#63D4FF" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="glowB" cx="0.5" cy="0.5" r="0.5">
        <stop offset="0%" stop-color="#43E2B6" stop-opacity="0.16"/>
        <stop offset="100%" stop-color="#43E2B6" stop-opacity="0"/>
      </radialGradient>
      
    </defs>
    <rect width="1600" height="900" fill="url(#bgGrad)"/>
    <circle cx="1360" cy="180" r="250" fill="url(#glowA)"/>
    <circle cx="220" cy="790" r="260" fill="url(#glowB)"/>
    
    
    
    <text x="88" y="92" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="800" fill="#63D4FF">02 / WHY THIS MATTERS</text>
    <text x="88" y="168" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="58" font-weight="900" fill="#F8FBFF">为什么值得做</text>
<text x="88" y="230.64" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="58" font-weight="900" fill="#F8FBFF">这类智能体</text>
    <text x="88" y="298" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="24" fill="#B8C6D6">真正的矛盾不是“没有能力”，而是“不会 DSL 的人无法稳定拿到结果”。</text>
    <rect x="88" y="326" width="520" height="8" rx="4" fill="url(#warmGrad)"/>
  
    <rect x="88" y="374" width="1424" height="132" rx="30" fill="url(#warmGrad)" stroke="url(#warmGrad)" stroke-width="2"/>
      <text x="800" y="438" text-anchor="middle" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="42" font-weight="900" fill="#07131F">目标不是让 AI 会写 DSL</text>
<text x="800" y="486.72" text-anchor="middle" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="42" font-weight="900" fill="#07131F">而是让组织稳定获得 DSL 结果</text>
    

    <rect x="88" y="548" width="328" height="188" rx="24" fill="#12263F" fill-opacity="1" stroke="#2E5679" stroke-width="2"/>
      <text x="120" y="594" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="800" fill="#63D4FF">POINT 01</text>
      <text x="120" y="640" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="900" fill="#F8FBFF">业务需求真实存在</text>
      <text x="120" y="688" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="400" fill="#B8C6D6">大家知道想查什么</text>
<text x="120" y="715" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="400" fill="#B8C6D6">但不会写底层 DSL</text>
    
    <rect x="446" y="548" width="328" height="188" rx="24" fill="#12263F" fill-opacity="1" stroke="#2E5679" stroke-width="2"/>
      <text x="478" y="594" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="800" fill="#9C87FF">POINT 02</text>
      <text x="478" y="640" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="900" fill="#F8FBFF">DSL 高度敏感</text>
      <text x="478" y="688" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="400" fill="#B8C6D6">字段、类型、顺序</text>
<text x="478" y="715" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="400" fill="#B8C6D6">都会影响最终能否执行</text>
    
    <rect x="804" y="548" width="328" height="188" rx="24" fill="#12263F" fill-opacity="1" stroke="#2E5679" stroke-width="2"/>
      <text x="836" y="594" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="800" fill="#43E2B6">POINT 03</text>
      <text x="836" y="640" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="900" fill="#F8FBFF">专家交付不可扩展</text>
      <text x="836" y="688" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="400" fill="#B8C6D6">依赖少数专家手工编写</text>
<text x="836" y="715" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="400" fill="#B8C6D6">成本高且响应慢</text>
    
    <rect x="1162" y="548" width="350" height="188" rx="24" fill="#12263F" fill-opacity="1" stroke="#2E5679" stroke-width="2"/>
      <text x="1194" y="594" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="800" fill="#FFD58C">POINT 04</text>
      <text x="1194" y="640" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="900" fill="#F8FBFF">组织需要稳定分发</text>
      <text x="1194" y="688" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="400" fill="#B8C6D6">结果必须可校验</text>
<text x="1194" y="715" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="400" fill="#B8C6D6">也必须可交付、可追责</text>
    

    
    <line x1="88" y1="846" x2="1512" y2="846" stroke="#234764" stroke-width="1.5"/>
    <text x="88" y="872" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#8EA0B3">来源：原始大纲第一部分。</text>
    <text x="1512" y="872" text-anchor="end" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#8EA0B3">核心判断 / 为什么这件事重要</text>
  
  
  </svg>