    <circle cx="914" cy="638" r="14" fill="url(#jadeGrad)"/>
    <text x="956" y="366" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="800" fill="#F8FBFF">约束编排</text>
    <text x="956" y="398" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="18" fill="#B8C6D6">把语法、字段、禁令和流程显式化</text>
    <text x="956" y="490" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="800" fill="#F8FBFF">校验修复</text>
    <text x="956" y="522" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="18" fill="#B8C6D6">把错误拉回可执行区间</text>
    <text x="956" y="614" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="800" fill="#F8FBFF">闭环交付</text>
    <text x="956" y="646" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="18" fill="#B8C6D6">最终输出可验证、可追责结果</text>

    
    <rect x="88" y="706" width="316" height="60" rx="30" fill="#11253D" stroke="#2E5679" stroke-width="2"/>
    <text x="246" y="744" text-anchor="middle" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="800" fill="#F8FBFF">自然语言 -&gt; 逻辑蓝图</text>
  
    
    <rect x="424" y="706" width="294" height="60" rx="30" fill="#11253D" stroke="#2E5679" stroke-width="2"/>
    <text x="571" y="744" text-anchor="middle" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="800" fill="#F8FBFF">DSL 翻译 -&gt; 整流</text>
  
    
    <rect x="738" y="706" width="302" height="60" rx="30" fill="#11253D" stroke="#2E5679" stroke-width="2"/>
    <text x="889" y="744" text-anchor="middle" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="800" fill="#F8FBFF">修复 -&gt; 回归验证</text>
  
    
    <rect x="1060" y="706" width="352" height="60" rx="30" fill="url(#warmGrad)" stroke="url(#warmGrad)" stroke-width="2"/>
