    <circle cx="220" cy="790" r="260" fill="url(#glowB)"/>
    
    
    <text x="918" y="252" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="168" font-weight="900" fill="#E9F4FF" fill-opacity="0.07">COMPILER</text>
    <text x="1024" y="392" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="168" font-weight="900" fill="#E9F4FF" fill-opacity="0.05">SYSTEM</text>
    <text x="88" y="92" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="800" fill="#FFB547">01 / POSITIONING</text>
    <text x="88" y="174" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="72" font-weight="900" fill="#F8FBFF">强约束 DSL</text>
<text x="88" y="248.88" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="72" font-weight="900" fill="#F8FBFF">智能体搭建经验</text>
    <text x="88" y="342" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="26" fill="#B8C6D6">问题不是“模型会不会写”，而是“系统能不能稳定交付”。</text>
    <rect x="88" y="372" width="524" height="8" rx="4" fill="url(#warmGrad)"/>

    <rect x="88" y="438" width="530" height="208" rx="28" fill="#11253D" fill-opacity="1" stroke="#2E5679" stroke-width="2"/>
      <text x="122" y="494" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="800" fill="#FFD58C">主张</text>
      <text x="122" y="556" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="34" font-weight="850" fill="#F8FBFF">我们不是在做懂语法的聊天助手</text>
<text x="122" y="596.8" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="34" font-weight="850" fill="#F8FBFF">而是在做把自然语言</text>
<text x="122" y="637.6" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="34" font-weight="850" fill="#F8FBFF">稳定编译成 DSL 的工程系统</text>
    

    <rect x="1042" y="118" width="370" height="156" rx="26" fill="url(#warmGrad)" stroke="url(#warmGrad)" stroke-width="2"/>
      <text x="1074" y="170" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="900" fill="#07131F">结论</text>
      <text x="1074" y="222" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="26" font-weight="900" fill="#07131F">首轮像不像不重要</text>
<text x="1074" y="255.28" font-family="Aptos, PingFang SC, Microsoft YaHei, sans-serif" font-size="26" font-weight="900" fill="#07131F">最终能交付才重要</text>
    

    <path d="M914 316 L914 684" stroke="#2E5679" stroke-width="2.5"/>
    <path d="M914 390 H1164" stroke="#2E5679" stroke-width="2.5"/>
